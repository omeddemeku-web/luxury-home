<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Real Estate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-center">
            <div class="logo">LUXE<span>HOMES</span></div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Properties</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <button class="theme-toggle" id="theme-btn">🌙</button>
        </div>
    </nav>

    <!-- Hero section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Find Your Dream Luxury Home</h1>
            <p>Experience elegance and comfort in the most exclusive locations.</p>
            <div class="search-bar">
                <input type="text" placeholder="Search by location...">
                <button>Search</button>
            </div>
        </div>
    </section>

    <!-- Featured Properties -->
    <section class="featured">
        <h2>Featured Properties</h2>
        <div class="property-container">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=500&q=60" alt="Villa">
                <h3>Luxury Villa</h3>
                <p>$1,200,000</p>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=500&q=60" alt="Apartment">
                <h3>Modern Apartment</h3>
                <p>$850,000</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
